name: Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: rg.fr-par.scw.cloud/funcscwriseriscvrunnerappqdvknz9s
  IMAGE: riscv-runner
  PROD_URL: https://riseriscvrunnerappqdvknz9s-gh-webhook.functions.fnc.fr-par.scw.cloud
  STAGING_URL: https://riseriscvrunnerappst73ndwr0w-gh-webhook.functions.fnc.fr-par.scw.cloud

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.result }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "result=main" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "result=staging" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r container/requirements.txt
          pip install -r requirements-dev.txt
          PYTHONPATH=${{ github.workspace }}/container pytest

  deploy:
    if: github.repository_owner == 'riseproject-dev' && needs.resolve.outputs.environment != ''
    needs: [test, resolve]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rlespinasse/github-slug-action@9e7def61550737ba68c62d34a32dd31792e3f429 # v5.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build gh-webhook image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: linux/amd64
          context: container
          file: container/Dockerfile.gh_webhook
          tags: |
            ${{ needs.resolve.outputs.environment == 'main'    && format('{0}/{1}:gh-webhook-latest', env.REGISTRY, env.IMAGE) || '' }}
            ${{ needs.resolve.outputs.environment == 'staging' && format('{0}/{1}:gh-webhook-staging', env.REGISTRY, env.IMAGE) || '' }}
          cache-from: |
            type=gha,scope=gh-webhook-main
            ${{ format('type=gha,scope=type=gha,scope=gh-webhook-{0}', env.GITHUB_REF_NAME_SLUG) }}
          cache-to: |
            ${{ format('type=gha,scope=type=gha,scope=gh-webhook-{0}', env.GITHUB_REF_NAME_SLUG) }}
          push: true

      - name: Build scheduler image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: linux/amd64
          context: container
          file: container/Dockerfile.scheduler
          tags: |
            ${{ needs.resolve.outputs.environment == 'main'    && format('{0}/{1}:scheduler-latest', env.REGISTRY, env.IMAGE) || '' }}
            ${{ needs.resolve.outputs.environment == 'staging' && format('{0}/{1}:scheduler-staging', env.REGISTRY, env.IMAGE) || '' }}
          cache-from: |
            type=gha,scope=scheduler-main
            ${{ format('type=gha,scope=type=gha,scope=scheduler-{0}', env.GITHUB_REF_NAME_SLUG) }}
          cache-to: |
            ${{ format('type=gha,scope=type=gha,scope=scheduler-{0}', env.GITHUB_REF_NAME_SLUG) }}
          push: true

      - run: npm ci

      - name: Deploy to Scaleway
        run: npx serverless@3 deploy --verbose --stage=${{ needs.resolve.outputs.environment }}
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          GHAPP_WEBHOOK_SECRET: ${{ secrets.GHAPP_WEBHOOK_SECRET }}
          GHAPP_ORG_PRIVATE_KEY: ${{ secrets.GHAPP_ORG_PRIVATE_KEY }}
          GHAPP_PERSONAL_PRIVATE_KEY: ${{ secrets.GHAPP_PERSONAL_PRIVATE_KEY }}
          K8S_KUBECONFIG: ${{ secrets.K8S_KUBECONFIG }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Health check
        run: python3 ./bin/check-health.py ${{ needs.resolve.outputs.environment == 'staging' && '--staging' || '' }}

      - name: Trigger sample workflow
        if: needs.resolve.outputs.environment == 'staging'
        env:
          GH_TOKEN: ${{ secrets.RISCV_RUNNER_SAMPLE_ACCESS_TOKEN }}
          GH_REPO: riseproject-dev/riscv-runner-sample
          GH_WORKFLOW: hello.yml
        run: |
          gh workflow run ${GH_WORKFLOW} --repo ${GH_REPO}
          sleep 5
          gh run watch $(gh run list --repo ${GH_REPO} --workflow ${GH_WORKFLOW} --limit 1 --json databaseId --jq '.[0].databaseId') --repo ${GH_REPO} --exit-status
